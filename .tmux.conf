# ~/.tmux.conf

# Terminal
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 50000
set -sg escape-time 10
set -g focus-events on
set -g default-command "${SHELL}"

# Bindings
bind r source-file ~/.tmux.conf \; display "Reloaded"
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5
bind x kill-pane
bind X kill-window
bind C-c run-shell "tmux select-pane -t .+ 2>/dev/null || tmux split-window -h -l 90 -c '#{pane_current_path}' 'bash -li -c claude'"

# Vim-tmux-navigator (C-h/j/k/l to navigate panes and vim splits)
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|fzf)(diff)?$'"
bind -n C-h if-shell "$is_vim" 'send-keys C-h' 'select-pane -L'
bind -n C-j if-shell "$is_vim" 'send-keys C-j' 'select-pane -D'
bind -n C-k if-shell "$is_vim" 'send-keys C-k' 'select-pane -U'
bind -n C-l if-shell "$is_vim" 'send-keys C-l' 'select-pane -R'
bind C-l send-keys 'C-l'

# Copy mode (vim-style)
setw -g mode-keys vi
bind v copy-mode
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi V send-keys -X select-line
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle

# Clipboard
set -g set-clipboard on
if-shell 'tmux -V | awk "{if (\$2+0 < 3.3) exit 1}"' 'set -g allow-passthrough on'
if-shell 'uname | grep -q Darwin' {
    bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
    bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"
}
if-shell '[ -n "$DISPLAY" ] && command -v xclip >/dev/null' {
    bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xclip -selection clipboard"
    bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "xclip -selection clipboard"
}

# Solarized Light theme
set -g status-style "bg=#eee8d5,fg=#657b83"
set -g status-left "#[fg=#fdf6e3,bg=#268bd2,bold] #S #[default] "
set -g status-right " %H:%M "
set -g window-status-format " #I:#W "
set -g window-status-current-format "#[fg=#fdf6e3,bg=#859900,bold] #I:#W #[default]"
set -g pane-border-style "fg=#93a1a1"
set -g pane-active-border-style "fg=#268bd2"
set -g message-style "fg=#fdf6e3,bg=#268bd2"
set -g mode-style "fg=#fdf6e3,bg=#268bd2"

# TPM - Tmux Plugin Manager
# Install: git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm
# Then press prefix + I to install plugins
set -g @plugin 'tmux-plugins/tpm'

# Initialize TPM (keep this line at the very bottom)
run '~/.tmux/plugins/tpm/tpm'
